services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      # Default binds to loopback only: nothing on the LAN/internet can reach
      # the API directly, regardless of firewall layers. Use a reverse proxy
      # (Caddy) for external access.
      # Known issue: OrbStack (<= 2.2.0) fails to forward loopback-bound ports
      # when host and container ports match — set BIND_ADDR=0.0.0.0 in .env
      # as a workaround (see https://github.com/orbstack/orbstack/issues/944).
      - "${BIND_ADDR:-127.0.0.1}:3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in .env file}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3001}
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - SERVER_USER=${SERVER_USER:-deploy}
      - HOST_REPOS_DIR=${HOST_REPOS_DIR:-/app/data/repos}
      # Cap Node heap so a slow leak triggers a clean OOM-restart instead of dragging the host down
      - NODE_OPTIONS=--max-old-space-size=2048
    volumes:
      # Mount source for hot reload in development
      - ./server/src:/app/src
      # Shared types for monorepo
      - ./shared:/app/shared
      # Data directory for SQLite databases
      - ./data:/app/data
    command: >
      sh -c "git config --global user.email 'system@ai-company-builder' &&
             git config --global user.name 'AI Company Builder' &&
             git config --global safe.directory '*' &&
             npx tsx watch src/index.ts"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(\"http://localhost:3001/api/config\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "autoheal=true"

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    ports:
      # Loopback by default — see the api service note
      - "${BIND_ADDR:-127.0.0.1}:3100:3100"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_API_URL=${PUBLIC_URL:-http://localhost:3001}
      # Server-side /api/* proxy target — must reach the api container over the
      # compose network (localhost inside the admin container is admin itself)
      - API_PROXY_URL=http://api:3001
      # Cap Node heap (smaller than api: admin is mostly static rendering)
      - NODE_OPTIONS=--max-old-space-size=1024
    volumes:
      # Mount source for hot reload
      - ./admin/src:/app/admin/src
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(\"http://localhost:3100/\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "autoheal=true"

  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
